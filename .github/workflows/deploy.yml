name: Deploy Platform Self-Service API

on:
  push:
    branches:
      - main
      - improve/ai-workflow-and-security
  pull_request:
    branches:
      - main

jobs:
  terraform-and-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Python dependencies for Lambda package
        run: |
          python -m pip install --upgrade pip
          mkdir -p build dist
          pip install \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.11 \
            --only-binary=:all: \
            --target build \
            fastapi mangum pydantic boto3

      - name: Copy application files
        run: |
          cp -r app build/app
          cp app/main.py build/main.py

      - name: Create Lambda deployment package
        run: |
          cd build
          zip -r ../dist/lambda.zip .

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=platform-api-terraform-state-richard-1" \
            -backend-config="key=platform-self-service-api/dev/terraform.tfstate" \
            -backend-config="region=us-east-1"

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -var="lambda_zip_path=../dist/lambda.zip"

      - name: Terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: terraform
        run: terraform apply -auto-approve -var="lambda_zip_path=../dist/lambda.zip"